server:
  port: 8084

spring:
  application:
    name: order-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:microservices}
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/hometown}
    username: ${DB_USER:hometown}
    password: ${DB_PASSWORD:hometown}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.default_schema: orders
  flyway:
    default-schema: orders
    schemas: orders
    create-schemas: true

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    tags:
      application: order-service
