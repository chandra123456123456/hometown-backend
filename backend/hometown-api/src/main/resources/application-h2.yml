spring:
  datasource:
    url: jdbc:h2:mem:hometown;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate.hbm2ddl.create_namespaces: true
      hibernate.dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
